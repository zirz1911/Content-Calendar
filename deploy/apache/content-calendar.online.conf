<VirtualHost *:80>
    ServerName content-calendar.online
    ServerAlias www.content-calendar.online

    ProxyPreserveHost On
    ProxyRequests Off

    LimitRequestBody 20971520

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ProxyPass / http://127.0.0.1:3100/
    ProxyPassReverse / http://127.0.0.1:3100/

    ErrorLog ${APACHE_LOG_DIR}/content-calendar-error.log
    CustomLog ${APACHE_LOG_DIR}/content-calendar-access.log combined
</VirtualHost>
